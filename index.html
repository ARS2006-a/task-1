<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roast My Password 🔥</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">🔥 ROAST MY PASSWORD 🔥</h1>
        <p class="subtitle">I dare you to use "password123"</p>
        
        <div class="input-section">
            <input type="text" id="passwordInput" placeholder="Type your password..." autocomplete="off">
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
        </div>
        
        <div class="result" id="result">
            <div class="emoji" id="emoji">🤔</div>
            <div class="roast" id="roast">Type something and watch me roast it...</div>
            <div class="score" id="score"></div>
        </div>
        
        <div class="stats" id="stats"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
